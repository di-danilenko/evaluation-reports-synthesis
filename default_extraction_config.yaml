provider: azure
model: gpt-4o-mini
temperature: 0.1
max_tokens: null
max_context_tokens: 16384
default_context_type: full_document
truncate_on_overflow: false
prompt_config:
  system_prompt: 'You will be provided with a context from a paper and a list of questions
    below.

    Based on the context, answer each question as true or false and return a list
    of JSON objects.


    Please explain step by step reasoning behind each answer.

    You should also cite text from the paper context to support your answer if the
    answer is True. If the citation is present at multiple places, please cite all
    of them in the additional_text key. You can separate the citations with ------.


    IMPORTANT: Be careful to distinguish between the current paper''s findings and
    references to previous literature. When the text refers to other studies (indicated
    by citation markers like reference numbers [1], author names and years (Smith
    et al., 2020), etc.), do not use these statements as evidence for the current
    paper''s attributes. Only use statements that directly describe the current paper''s
    methodology.



    Paper text is provided inside the JSON under the "context" key.


    Input JSON:

    {input_json}

    '
include_reasoning: true
include_additional_text: true
